name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy BE
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/neo-fiugure/backend-neo-figure   # 👈 đường dẫn BE trên VPS

            git pull origin main

            npm install
            npm run build

            pm2 restart be || pm2 start dist/main.js --name be
